<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gift Story</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:100%;
height:100vh;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at center,#f9a8d4,#be185d,#09090b);

font-family:tahoma,sans-serif;

color:white;

}

body::before{

content:"";

position:absolute;

width:600px;
height:600px;

background:white;

filter:blur(180px);

opacity:.15;

}

.container{

width:100%;
height:100%;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

position:relative;

}

.title{

font-size:28px;

margin-bottom:70px;

text-align:center;

text-shadow:0 0 20px #fbcfe8;

}

.gift{

width:280px;

height:240px;

position:relative;

cursor:pointer;

transition:.5s;

filter:
drop-shadow(0 35px 50px rgba(0,0,0,.6));

}

.box{

position:absolute;

bottom:0;

width:280px;

height:170px;

background:
linear-gradient(135deg,#f472b6,#db2777);

border-radius:20px;

z-index:3;

}

.lid{

position:absolute;

top:15px;

left:-15px;

width:310px;

height:60px;

background:
linear-gradient(135deg,#fbcfe8,#ec4899);

border-radius:20px;

z-index:6;

transform-origin:left bottom;

transition:1.2s;

}

.ribbon{

position:absolute;

left:118px;

bottom:0;

width:45px;

height:240px;

background:
linear-gradient(#fef08a,#eab308);

z-index:7;

}

.ribbon2{

position:absolute;

top:100px;

width:280px;

height:45px;

background:
linear-gradient(#fef08a,#eab308);

z-index:7;

}

.number{

position:absolute;

left:50%;

top:50%;

transform:

translate(-50%,-50%)
scale(.1);

font-size:200px;

font-weight:900;

color:white;

text-shadow:

0 0 25px white,
0 0 70px #ec4899;

opacity:0;

transition:1.5s;

z-index:2;

}

.open .lid{

transform:

rotate(-75deg)
translate(-50px,-70px);

}

.open .number{

opacity:1;

transform:

translate(-50%,-170%)

scale(1);

}

.message{

position:absolute;

left:50%;

bottom:22%;

width:90%;

max-width:600px;

transform:

translateX(-50%)
translateY(70px);

opacity:0;

text-align:center;

font-size:27px;

transition:.8s;

z-index:30;

}

.message.show{

opacity:1;

transform:

translateX(-50%)
translateY(0);

}

button{

position:absolute;

padding:15px 45px;

border:none;

border-radius:50px;

background:white;

color:#be185d;

font-size:21px;

font-weight:bold;

cursor:pointer;

display:none;

z-index:100;

box-shadow:

0 10px 35px rgba(0,0,0,.4);

}

.choice{

display:none;

gap:25px;

position:absolute;

bottom:15%;

z-index:100;

}

.choice button{

position:relative;

display:block;

}

.message-button{

display:inline-block;

padding:15px 45px;

background:white;

color:#be185d;

border-radius:50px;

font-size:21px;

font-weight:bold;

cursor:pointer;

box-shadow:

0 10px 35px rgba(0,0,0,.4);

}

.confetti{

position:absolute;

font-size:40px;

animation:party 3s forwards;

}

@keyframes party{

0%{

transform:
translateY(0)
rotate(0);

opacity:1;

}

100%{

transform:

translateY(-600px)
rotate(360deg);

opacity:0;

}

}

.fade{

animation:fade 2s forwards;

}

@keyframes fade{

to{

opacity:0;

}

}

</style>

</head>

<body>

<div class="container">

<div class="title" id="title">

برای باز کردن هدیه ۴ بار کلیک کن 🎁

</div>

<div class="gift" id="gift">

<div class="number">
19
</div>

<div class="message" id="message"></div>

<div class="lid"></div>

<div class="box"></div>

<div class="ribbon"></div>

<div class="ribbon2"></div>

</div>

<button id="mainBtn">

بریم؟

</button>

<div class="choice" id="choice">

<button id="yesBtn">

آره

</button>

<button id="noBtn">

نه

</button>

</div>
<script>

const gift=document.getElementById("gift");

const title=document.getElementById("title");

const mainBtn=document.getElementById("mainBtn");

const message=document.getElementById("message");

const choice=document.getElementById("choice");

const yesBtn=document.getElementById("yesBtn");

const noBtn=document.getElementById("noBtn");

let giftClicks=0;

let step=0;

let secondRound=
localStorage.getItem("secondRound")==="true";

gift.onclick=function(){

if(giftClicks>=4)return;

giftClicks++;

gift.style.transform="rotate(5deg)";

setTimeout(()=>{

gift.style.transform="rotate(-5deg)";

},150);

setTimeout(()=>{

gift.style.transform="rotate(0)";

},300);

if(giftClicks===4){

gift.classList.add("open");

title.innerHTML=
"یه سورپرایز برای تو ✨";

createParty();

setTimeout(()=>{

showMessage("19 ❤️");

mainBtn.style.display="block";

},1200);

}

};

function showMessage(text){

message.innerHTML=text;

message.className="message show";

}

function createParty(){

let icons=[

"🎈",
"🎈",
"✨",
"💗",
"🎉",
"⭐"

];

for(let i=0;i<60;i++){

let item=document.createElement("div");

item.className="confetti";

item.innerHTML=
icons[Math.floor(Math.random()*icons.length)];

item.style.left=
Math.random()*100+"%";

item.style.top="60%";

document.body.appendChild(item);

setTimeout(()=>{

item.remove();

},3000);

}

}

let texts=[

"کجا میخوای بری مثلا؟",

"من که میدونم مازوخیستی خوشت میاد",

"بگی اره اونوقت میزارم بری"

];

mainBtn.onclick=function(){

if(step<texts.length){

mainBtn.innerHTML=texts[step];

moveButton();

step++;

return;

}

mainBtn.style.display="none";

choice.style.display="flex";

showMessage(
"خب انتخاب کن 😏"
);

};

yesBtn.onclick=function(){

choice.style.display="none";

if(secondRound){

continueStory();

}

else{

localStorage.setItem(
"secondRound",
"true"
);

showMessage(
"حالا که دوست داری برو دوباره از اول بیا."
);

setTimeout(()=>{

location.reload();

},2500);

}

};

noBtn.onclick=function(){

choice.style.display="none";

showMessage(
"دختر بد دوباره از اول بیا 😈"
);

setTimeout(()=>{

location.reload();

},2500);

};

function continueStory(){

showMessage(
"واقعا حاضر شدی قبول کنی مازوخیستی؟"
);

mainBtn.innerHTML="ادامه";

mainBtn.style.display="block";

mainBtn.onclick=function(){

mainBtn.style.display="none";

message.className=
"message show message-button";

message.innerHTML=
"مرسی که بخاطر من تا اینجا اومدی دورت بگردم ❤️";

message.onclick=function(){

message.className=
"message show message-button";

message.innerHTML=
"خوشحالم که تو قصه زندگیم شریکی ❤️";

message.onclick=function(){

goNext();

};

};

};

}

function moveButton(){

let x=
Math.random()*(window.innerWidth-220);

let y=
Math.random()*(window.innerHeight-150);

mainBtn.style.left=x+"px";

mainBtn.style.top=y+"px";

}

function goNext(){

localStorage.setItem(
"giftUnlocked",
"true"
);

document.body.classList.add("fade");

setTimeout(()=>{

window.location.href="download.html";

},2000);

}

</script>
</body>

</html>
